server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ────────────────────────────────────────────────────
    add_header X-Content-Type-Options   "nosniff"                          always;
    add_header X-Frame-Options          "SAMEORIGIN"                       always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin"  always;
    add_header Permissions-Policy       "geolocation=(), microphone=(), camera=()" always;

    # ── Gzip compression ────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_types
        text/plain
        text/css
        text/xml
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/wasm
        image/svg+xml
        font/woff
        font/woff2;

    # ── Hashed static assets (Vite fingerprints every file in /pulse/) ──────
    # Safe to cache for 1 year with immutable directive.
    location /pulse/ {
        try_files $uri =404;
        expires    1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Public assets (favicons, logos, og images — no hash in name) ────────
    location /favicons/ {
        try_files $uri =404;
        expires    7d;
        add_header Cache-Control "public";
        access_log off;
    }

    location /logos/ {
        try_files $uri =404;
        expires    7d;
        add_header Cache-Control "public";
        access_log off;
    }

    location /og/ {
        try_files $uri =404;
        expires    7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── sitemap.xml and robots.txt — allow search engines to recheck daily ──
    location = /sitemap.xml {
        try_files $uri =404;
        expires    1d;
        add_header Cache-Control "public";
    }

    location = /robots.txt {
        try_files $uri =404;
        expires    1d;
        add_header Cache-Control "public";
    }

    # ── HTML pages (prerendered) ─────────────────────────────────────────────
    # Short cache so deploys propagate quickly.
    location / {
        try_files $uri $uri/ /index.html;
        expires    1h;
        add_header Cache-Control "public, must-revalidate";
    }
}
