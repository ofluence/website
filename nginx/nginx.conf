server {
    listen 80;
    http2  on;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ────────────────────────────────────────────────────
    add_header X-Content-Type-Options   "nosniff"                          always;
    add_header X-Frame-Options          "SAMEORIGIN"                       always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin"  always;
    add_header Permissions-Policy       "geolocation=(), microphone=(), camera=()" always;

    # ── Precompressed assets (emitted at build time) ────────────────────────
    # Prefers .br, falls back to .gz, then raw. Zero runtime CPU cost.
    brotli_static on;
    gzip_static   on;

    # ── Runtime gzip fallback for anything not precompressed ────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_types
        text/plain
        text/css
        text/xml
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/wasm
        image/svg+xml
        font/woff
        font/woff2;

    # ── Hashed static assets (Vite fingerprints every file in /pulse/) ──────
    # Safe to cache for 1 year with immutable directive.
    location /pulse/ {
        try_files $uri =404;
        expires    1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Public assets (favicons, logos — no hash in name) ────────────────────
    location /favicons/ {
        try_files $uri =404;
        expires    7d;
        add_header Cache-Control "public";
        access_log off;
    }

    location /logos/ {
        try_files $uri =404;
        expires    7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── sitemap.xml and robots.txt — allow search engines to recheck daily ──
    location = /sitemap.xml {
        try_files $uri =404;
        expires    1d;
        add_header Cache-Control "public";
    }

    location = /robots.txt {
        try_files $uri =404;
        expires    1d;
        add_header Cache-Control "public";
    }

    # ── HTML pages (prerendered) ─────────────────────────────────────────────
    # Short cache so deploys propagate quickly. Unknown paths yield a real 404
    # served from the prerendered /404/index.html (see error_page below).
    location / {
        try_files $uri $uri/ =404;
        expires    1h;
        add_header Cache-Control "public, must-revalidate";
    }

    error_page 404 /404/index.html;
}
